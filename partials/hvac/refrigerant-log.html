<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Mechanical | Refrigerant Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="../../js/hvac/hvac-refrigerant.js"></script>
  </head>
  <body class="min-h-screen bg-neutral-950 text-white">
    <main class="min-h-screen p-4">
      <section
        class="mx-auto w-full max-w-md rounded-2xl border border-white/10 bg-white/5 p-5 shadow-2xl"
      >
        <div class="flex items-center justify-between">
          <button
            type="button"
            onclick="history.back()"
            class="inline-flex items-center gap-2 text-sm text-white/70 transition hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M9.707 4.293a1 1 0 010 1.414L6.414 9H17a1 1 0 110 2H6.414l3.293 3.293a1 1 0 01-1.414 1.414l-5-5a1 1 0 010-1.414l5-5a1 1 0 011.414 0z"
                clip-rule="evenodd"
              />
            </svg>
            <span>Back</span>
          </button>
          <a
            href="/index.html"
            class="inline-flex items-center gap-2 text-sm text-white/70 transition hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                d="M10.707 1.293a1 1 0 00-1.414 0l-8 8A1 1 0 002 11h1v6a1 1 0 001 1h4a1 1 0 001-1v-4h2v4a1 1 0 001 1h4a1 1 0 001-1v-6h1a1 1 0 00.707-1.707l-8-8z"
              />
            </svg>
            <span>Home</span>
          </a>
        </div>

        <div class="mt-4">
          <p
            class="text-xs font-semibold uppercase tracking-[0.24em] text-[#e5621c]/90"
          >
            Urban Mechanical
          </p>
          <h1 class="mt-2 text-3xl font-black tracking-tight">
            Refrigerant Log
          </h1>
          <p class="mt-2 text-sm text-white/65">
            Simple field entry for refrigerant activity.
          </p>
          <div id="queueIndicator" class="mt-3 hidden">
            <div
              class="inline-flex items-center gap-2 rounded-full border border-amber-400/20 bg-amber-500/10 px-3 py-1 text-xs font-medium text-amber-200"
            >
              <span class="h-2 w-2 rounded-full bg-amber-300"></span>
              <span id="queueIndicatorText">1 queued</span>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <button
                type="button"
                id="viewQueuedBtn"
                class="rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs font-medium text-white/80"
              >
                View queued logs
              </button>
            </div>
          </div>
          <div
            id="editQueueBanner"
            class="mt-3 hidden rounded-2xl border border-[#e5621c]/20 bg-[#e5621c]/10 px-4 py-3 text-sm text-cyan-100"
          >
            Editing a queued refrigerant log. Saving will update the local
            queued copy.
          </div>
        </div>

        <div class="mt-5">
          <div class="h-2 w-full overflow-hidden rounded-full bg-white/10">
            <div
              id="wizardProgress"
              class="h-full w-[9.09%] rounded-full bg-[#e5621c] transition-all duration-300"
            ></div>
          </div>
          <div id="wizardStepText" class="mt-2 text-xs text-white/50">
            Step 1 of 11
          </div>
        </div>

        <form id="refWizardForm" class="mt-5">
          <div class="space-y-4">
            <section class="wizard-step" data-step="0">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <label
                  for="refTech"
                  class="block text-sm font-semibold text-white"
                  >Tech Name</label
                >
                <input
                  id="refTech"
                  name="tech"
                  type="text"
                  autocapitalize="words"
                  autocomplete="name"
                  enterkeyhint="next"
                  class="mt-3 block w-full rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 text-base text-white outline-none placeholder:text-white/30 focus:border-[#e5621c]"
                  placeholder="Enter tech name"
                />
              </div>
            </section>

            <section class="wizard-step hidden" data-step="1">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <label
                  for="refJobNumber"
                  class="block text-sm font-semibold text-white"
                  >Housecall Pro Job #</label
                >
                <input
                  id="refJobNumber"
                  name="jobNumber"
                  autocapitalize="characters"
                  enterkeyhint="next"
                  type="text"
                  class="mt-3 block w-full rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 text-base text-white outline-none placeholder:text-white/30 focus:border-[#e5621c]"
                  placeholder="Enter job number"
                />
              </div>
            </section>

            <section class="wizard-step hidden" data-step="2">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <label
                  for="refCustomer"
                  class="block text-sm font-semibold text-white"
                  >Customer Name</label
                >
                <input
                  id="refCustomer"
                  name="customer"
                  type="text"
                  autocapitalize="words"
                  enterkeyhint="next"
                  class="mt-3 block w-full rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 text-base text-white outline-none placeholder:text-white/30 focus:border-[#e5621c]"
                  placeholder="Enter customer name"
                />
              </div>
            </section>

            <section class="wizard-step hidden" data-step="3">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <label
                  for="refCity"
                  class="block text-sm font-semibold text-white"
                  >City</label
                >
                <input
                  id="refCity"
                  name="city"
                  type="text"
                  autocapitalize="words"
                  enterkeyhint="next"
                  class="mt-3 block w-full rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 text-base text-white outline-none placeholder:text-white/30 focus:border-[#e5621c]"
                  placeholder="Enter city"
                />

                <div class="mt-4">
                  <label
                    for="refState"
                    class="block text-sm font-semibold text-white"
                    >State</label
                  >
                  <div class="relative mt-3">
                    <select
                      id="refState"
                      name="state"
                      class="block w-full appearance-none rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 pr-12 text-base text-white outline-none focus:border-[#e5621c]"
                    >
                      <option value="">Select state</option>
                    </select>
                    <div
                      class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4 text-white/50"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-4 w-4"
                        viewBox="0 0 20 20"
                        fill="currentColor"
                      >
                        <path
                          fill-rule="evenodd"
                          d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.51a.75.75 0 01-1.08 0l-4.25-4.51a.75.75 0 01.02-1.06z"
                          clip-rule="evenodd"
                        />
                      </svg>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section class="wizard-step hidden" data-step="4">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <label
                  for="refEquipmentType"
                  class="block text-sm font-semibold text-white"
                  >Equipment Type</label
                >
                <div class="relative mt-3">
                  <select
                    id="refEquipmentType"
                    name="equipmentType"
                    class="block w-full appearance-none rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 pr-12 text-base text-white outline-none focus:border-[#e5621c]"
                  >
                    <option value="">Select equipment type</option>
                  </select>
                  <div
                    class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4 text-white/50"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="h-4 w-4"
                      viewBox="0 0 20 20"
                      fill="currentColor"
                    >
                      <path
                        fill-rule="evenodd"
                        d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.51a.75.75 0 01-1.08 0l-4.25-4.51a.75.75 0 01.02-1.06z"
                        clip-rule="evenodd"
                      />
                    </svg>
                  </div>
                </div>
              </div>
            </section>

            <section class="wizard-step hidden" data-step="5">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <label
                  for="refRefrigerantType"
                  class="block text-sm font-semibold text-white"
                  >Refrigerant Type</label
                >
                <div class="relative mt-3">
                  <select
                    id="refRefrigerantType"
                    name="refrigerantType"
                    class="block w-full appearance-none rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 pr-12 text-base text-white outline-none focus:border-[#e5621c]"
                  >
                    <option value="">Select refrigerant type</option>
                  </select>
                  <div
                    class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4 text-white/50"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="h-4 w-4"
                      viewBox="0 0 20 20"
                      fill="currentColor"
                    >
                      <path
                        fill-rule="evenodd"
                        d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.51a.75.75 0 01-1.08 0l-4.25-4.51a.75.75 0 01.02-1.06z"
                        clip-rule="evenodd"
                      />
                    </svg>
                  </div>
                </div>
              </div>
            </section>

            <section class="wizard-step hidden" data-step="6">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label
                      for="refAddedLbs"
                      class="block text-sm font-semibold text-white"
                      >Added Pounds</label
                    >
                    <input
                      id="refAddedLbs"
                      name="addedLbs"
                      type="number"
                      min="0"
                      step="1"
                      inputmode="numeric"
                      enterkeyhint="next"
                      class="mt-3 block w-full rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 text-base text-white outline-none focus:border-[#e5621c]"
                      placeholder="0"
                    />
                  </div>
                  <div>
                    <label
                      for="refAddedOz"
                      class="block text-sm font-semibold text-white"
                      >Added Ounces</label
                    >
                    <input
                      id="refAddedOz"
                      name="addedOz"
                      type="number"
                      min="0"
                      inputmode="decimal"
                      enterkeyhint="next"
                      max="15.99"
                      step="0.1"
                      class="mt-3 block w-full rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 text-base text-white outline-none focus:border-[#e5621c]"
                      placeholder="0"
                    />
                  </div>
                </div>
              </div>
            </section>

            <section class="wizard-step hidden" data-step="7">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label
                      for="refRecoveredLbs"
                      class="block text-sm font-semibold text-white"
                      >Recovered Pounds</label
                    >
                    <input
                      id="refRecoveredLbs"
                      name="recoveredLbs"
                      type="number"
                      min="0"
                      inputmode="numeric"
                      enterkeyhint="next"
                      step="1"
                      class="mt-3 block w-full rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 text-base text-white outline-none focus:border-[#e5621c]"
                      placeholder="0"
                    />
                  </div>
                  <div>
                    <label
                      for="refRecoveredOz"
                      class="block text-sm font-semibold text-white"
                      >Recovered Ounces</label
                    >
                    <input
                      id="refRecoveredOz"
                      name="recoveredOz"
                      type="number"
                      min="0"
                      max="15.99"
                      step="0.1"
                      inputmode="decimal"
                      enterkeyhint="next"
                      class="mt-3 block w-full rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 text-base text-white outline-none focus:border-[#e5621c]"
                      placeholder="0"
                    />
                  </div>
                </div>
              </div>
            </section>

            <section class="wizard-step hidden" data-step="8">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <label class="block text-sm font-semibold text-white">
                  Leak Suspected
                </label>

                <input
                  id="refLeakSuspected"
                  name="leakSuspected"
                  type="hidden"
                  value=""
                />

                <div class="mt-3 grid grid-cols-2 gap-3">
                  <button
                    type="button"
                    class="leakChoiceBtn rounded-2xl border border-white/10 bg-neutral-900 px-4 py-4 text-base font-bold text-white transition active:scale-[0.98]"
                    data-value="Yes"
                  >
                    Yes
                  </button>

                  <button
                    type="button"
                    class="leakChoiceBtn rounded-2xl border border-white/10 bg-neutral-900 px-4 py-4 text-base font-bold text-white transition active:scale-[0.98]"
                    data-value="No"
                  >
                    No
                  </button>
                </div>

                <div
                  class="hidden border-[#e5621c]/30 bg-[#e5621c]/15 text-[#e5621c]"
                ></div>
              </div>
            </section>

            <section class="wizard-step hidden" data-step="9">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <label
                  for="refNotes"
                  class="block text-sm font-semibold text-white"
                  >Notes</label
                >
                <textarea
                  id="refNotes"
                  name="notes"
                  enterkeyhint="done"
                  rows="5"
                  class="mt-3 block w-full rounded-xl border border-white/10 bg-neutral-900 px-4 py-3 text-base text-white outline-none placeholder:text-white/30 focus:border-[#e5621c]"
                  placeholder="Optional notes"
                ></textarea>
              </div>
            </section>

            <section class="wizard-step hidden" data-step="10">
              <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                <h2 class="text-base font-bold text-white">Review</h2>
                <div id="reviewList" class="mt-4 space-y-3 text-sm"></div>
              </div>
            </section>
          </div>

          <div
            id="wizardError"
            class="mt-4 hidden rounded-xl border border-red-400/20 bg-red-500/10 px-4 py-3 text-sm text-red-200"
          ></div>
          <div
            id="wizardStatus"
            class="mt-4 hidden rounded-xl border px-4 py-3 text-sm"
          ></div>

          <div class="mt-5 flex items-center gap-3">
            <button
              id="backBtn"
              type="button"
              class="hidden min-h-[48px] flex-1 rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm font-semibold text-white/85"
            >
              Back
            </button>

            <button
              id="nextBtn"
              type="button"
              class="min-h-[48px] flex-1 rounded-xl bg-[#e5621c] px-4 py-3 text-sm font-bold text-neutral-950"
            >
              Next
            </button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
