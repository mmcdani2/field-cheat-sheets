<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Mechanical</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/favicon-32.png"
    />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/icons/site.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/js/pwa-shell.js"></script>
  </head>
  <body class="min-h-screen bg-neutral-950 text-white">
    <main class="min-h-screen p-4">
      <section
        class="mx-auto w-full max-w-md rounded-2xl border border-white/10 bg-white/5 p-5 shadow-2xl"
      >
        <div class="flex items-center justify-between">
          <button
            type="button"
            onclick="history.back()"
            class="inline-flex items-center gap-2 text-sm text-white/70 transition hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M9.707 4.293a1 1 0 010 1.414L6.414 9H17a1 1 0 110 2H6.414l3.293 3.293a1 1 0 01-1.414 1.414l-5-5a1 1 0 010-1.414l5-5a1 1 0 011.414 0z"
                clip-rule="evenodd"
              />
            </svg>
            <span>Back</span>
          </button>
          <a
            href="/index.html"
            class="inline-flex items-center gap-2 text-sm text-white/70 transition hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                d="M10.707 1.293a1 1 0 00-1.414 0l-8 8A1 1 0 002 11h1v6a1 1 0 001 1h4a1 1 0 001-1v-4h2v4a1 1 0 001 1h4a1 1 0 001-1v-6h1a1 1 0 00.707-1.707l-8-8z"
              />
            </svg>
            <span>Home</span>
          </a>
        </div>

        <div class="mt-4">
          <p
            class="text-xs font-semibold uppercase tracking-[0.24em] text-[#e5621c]/90"
          >
            Urban Mechanical
          </p>
          <h1 class="mt-2 text-3xl font-black tracking-tight">HVAC Tools</h1>
          <p class="mt-2 text-sm text-white/65">Choose a tool.</p>
        </div>

        <div class="mt-6 space-y-3">
          <a
            href="partials/hvac/refrigerant-log.html"
            class="flex min-h-[60px] w-full items-center justify-between rounded-xl border border-white/10 bg-white/5 px-4 py-4 text-left transition active:scale-[0.99]"
          >
            <div>
              <div class="text-base font-bold">Refrigerant Log</div>
              <div class="text-sm text-white/60">
                Submit refrigerant activity
              </div>
            </div>
            <span class="text-white/40">→</span>
          </a>

          <a
            href="partials/hvac/quick-pricing-tool.html"
            class="flex min-h-[60px] w-full items-center justify-between rounded-xl border border-white/10 bg-white/5 px-4 py-4 text-left transition active:scale-[0.99]"
          >
            <div>
              <div class="text-base font-bold">Quick Pricing Tool</div>
              <div class="text-sm text-white/60">
                Material + labor to quoted price
              </div>
            </div>
            <span class="text-white/40">→</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
