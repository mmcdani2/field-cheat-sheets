<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Field Reference</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/favicon-32.png"
    />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/icons/site.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/js/pwa-shell.js"></script>
  </head>
  <body class="min-h-screen bg-neutral-950 text-white">
    <main class="min-h-screen flex items-center justify-center p-4">
      <section
        class="w-full max-w-md rounded-2xl border border-white/10 bg-white/5 p-5 shadow-2xl"
      >
        <div class="mb-6">
          <p
            class="text-xs font-semibold uppercase tracking-[0.24em] text-amber-400/90"
          >
            Field App
          </p>
          <h1 class="mt-2 text-3xl font-black tracking-tight">
            Urban Field Reference
          </h1>
        </div>

        <div class="mt-4 flex flex-wrap items-center gap-2">
          <div
            class="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs font-medium text-white/80"
          >
            <span
              id="pwaConnectionDot"
              class="h-2 w-2 rounded-full bg-emerald-300"
            ></span>
            <span id="pwaConnectionText">Online</span>
          </div>

          <button
            type="button"
            id="installAppBtn"
            class="rounded-full border border-cyan-400/20 bg-cyan-500/10 px-3 py-1 text-xs font-semibold text-cyan-200"
          >
            Install App
          </button>
        </div>

        <div
          id="pwaBanner"
          class="mt-4 hidden rounded-2xl border px-4 py-3 text-sm"
        >
          <div class="flex items-start justify-between gap-3">
            <div id="pwaBannerText" class="min-w-0"></div>
            <button
              type="button"
              id="dismissPwaBannerBtn"
              class="shrink-0 text-xs font-semibold text-white/60"
            >
              Dismiss
            </button>
          </div>
        </div>

        <div class="mt-6 space-y-3">
          <a
            href="hvac.html"
            class="flex min-h-[60px] w-full items-center justify-between rounded-xl border border-white/10 bg-white/5 px-4 py-4 text-left transition active:scale-[0.99]"
          >
            <div>
              <div class="text-base font-bold">Urban Mechanical</div>
              <div class="text-sm text-white/60">HVAC tools</div>
            </div>
            <span class="text-white/40">→</span>
          </a>

          <a
            href="spray-foam.html"
            class="flex min-h-[60px] w-full items-center justify-between rounded-xl border border-white/10 bg-white/5 px-4 py-4 text-left transition active:scale-[0.99]"
          >
            <div>
              <div class="text-base font-bold">Urban Spray Foam</div>
              <div class="text-sm text-white/60">Spray foam tools</div>
            </div>
            <span class="text-white/40">→</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
